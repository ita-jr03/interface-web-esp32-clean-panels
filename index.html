<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHM - Sistema de Limpeza TCC</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-active: #28a745;
            --accent-stop: #dc3545;
            --accent-blue: #007bff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Cabeçalhos e Painéis */
        .main-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .panel h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: #aaa; }
        
        /* Inputs e Botões */
        input, select { background: #333; color: white; width: 100%; padding: 10px; margin: 8px 0 15px 0; border-radius: 4px; border: 1px solid #444; box-sizing: border-box; }
        button { background: var(--accent-blue); color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        button:hover { filter: brightness(1.1); }
        button.active { background: var(--accent-active); }
        button.btn-danger { background: var(--accent-stop); }
        button.btn-reverter { background: #ff9800; }
        .holding { background: #ffc107 !important; color: black; transform: scale(0.98); }
        
        /* Status e Leds Virtuais */
        .status-bar { font-size: 0.9em; color: #ccc; display: flex; gap: 20px; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .dot-ok { background-color: var(--accent-active); box-shadow: 0 0 8px var(--accent-active); }
        .dot-error { background-color: var(--accent-stop); box-shadow: 0 0 8px var(--accent-stop); }
        
        /* Layout Grid/Flex */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .flex-row { display: flex; gap: 10px; }
        
        /* Barras de Bateria */
        .battery-container { margin-bottom: 15px; }
        .battery-box { background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #555; }
        .battery-fill { height: 100%; width: 0%; transition: width 0.5s ease-in-out, background-color 0.5s; }
        
        /* Feedback do Motor */
        .motor-status-box { padding: 15px; border: 2px solid #444; text-align: center; border-radius: 4px; font-weight: bold; margin-bottom: 15px; font-size: 1.2em; color: #888; background: #222; }
        .motor-status-box.active { border-color: var(--accent-active); color: var(--accent-active); background: rgba(40, 167, 69, 0.1); }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginForm" class="panel" style="max-width: 400px; margin: 100px auto;">
        <h2 style="text-align: center;">IHM Industrial</h2>
        <p style="text-align: center; color: #aaa;">Acesso Restrito</p>
        <div id="loginError" style="color: #ff4d4d; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 4px; display: none; margin-bottom: 15px; font-size: 0.9em;"></div>
        <label>E-mail:</label>
        <input type="email" id="email" placeholder="operador@sistema.com">
        <label>Senha:</label>
        <input type="password" id="password" placeholder="******">
        <button id="loginBtn">Entrar no Sistema</button>
    </div>

    <div class="main-header" style="display: none;">
        <div>
            <h2>Supervisório de Limpeza</h2>
        </div>
        <div class="status-bar">
            <div><span id="serverLed" class="status-dot dot-error"></span><span id="serverStatusText">Conectando...</span></div>
            <div><span id="espLed" class="status-dot dot-error"></span><span id="espStatusText">Aguardando ESP32...</span></div>
            <button id="logoutBtn" class="btn-danger" style="width: auto; padding: 5px 15px; margin: 0; margin-left: 15px;">Sair</button>
        </div>
    </div>

    <div id="dashboard" style="display: none;">
        
        <div class="panel grid-2">
            <button id="btnModoManual" class="active">MODO MANUAL</button>
            <button id="btnModoAuto">MODO AUTOMÁTICO</button>
        </div>

        <div class="grid-2">
            <div id="painelManual" class="panel">
                <h3>Comandos Manuais</h3>
                <div id="motorFeedback" class="motor-status-box">
                    <span id="lblEstadoMotor">PARADO</span> | DIR: <span id="lblDirecao">--</span>
                </div>
                <div class="flex-row">
                    <button id="btnIniciar" class="active">INICIAR LIMP.</button>
                    <button id="btnPausar" class="btn-danger">PAUSAR</button>
                </div>
                <button id="btnReverter" class="btn-reverter" style="margin-top: 10px;">SEGURE PARA REVERTER SENTIDO (3s)</button>
            </div>

            <div id="configAuto" class="panel" style="opacity: 0.5; pointer-events: none;">
                <h3>Configuração Automática</h3>
                <label>Tipo de Período:</label>
                <select id="selPeriodoTipo">
                    <option value="minutos">Minutos</option>
                    <option value="horas">Horas</option>
                    <option value="dias">Dias</option>
                </select>
                <label>Tempo entre limpezas:</label>
                <input type="number" id="numPeriodoValor" min="1" max="60" value="10">
                <button id="btnSalvarConfig">Salvar Configuração</button>
            </div>
        </div>

        <div class="panel grid-2">
            <div>
                <h3>Telemetria de Energia</h3>
                <div class="battery-container">
                    <label>Bateria 1: <span id="valBat1">--</span>V</label>
                    <div class="battery-box"><div id="bat1-fill" class="battery-fill"></div></div>
                </div>
                <div class="battery-container">
                    <label>Bateria 2: <span id="valBat2">--</span>V</label>
                    <div class="battery-box"><div id="bat2-fill" class="battery-fill"></div></div>
                </div>
            </div>
            <div>
                <h3>Dados de Operação</h3>
                <h1 style="font-size: 3em; margin: 10px 0; color: var(--accent-blue);" id="valCiclos">--</h1>
                <p style="margin-top: 0; color: #aaa;">Ciclos Completos Realizados</p>
                <button id="btnResetCiclos" class="btn-danger" style="margin-top: 25px;">Zerar Contador</button>
            </div>
        </div>

        <div class="panel">
            <h3>Cadastrar Novo Operador</h3>
            <div class="grid-2">
                <input type="email" id="newEmail" placeholder="Novo e-mail">
                <input type="password" id="newPassword" placeholder="Nova senha (min. 6 carac.)">
            </div>
            <button id="btnCriarUsuario" style="margin: 0;">Salvar Novo Operador</button>
        </div>

    </div>
</div>

<div id="toast">Notificação</div>

<script>

    // 1. CONFIGURAÇÕES DO FIREBASE
    // ==========================================
    const firebaseConfig = {

    const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
    
    // ==========================================
    // 2. STATUS DO SERVIDOR (Conexão Web -> Nuvem)
    // ==========================================
    const serverLed = document.getElementById('serverLed');
    const serverText = document.getElementById('serverStatusText');
    db.ref(".info/connected").on("value", snap => {
      if (snap.val() === true) {
        serverLed.className = "status-dot dot-ok";
        serverText.innerText = "Servidor Conectado";
      } else {
        serverLed.className = "status-dot dot-error";
        serverText.innerText = "Servidor Offline";
      }
    });

    // ==========================================
    // 3. FUNÇÕES UTILITÁRIAS
    // ==========================================
    function showToast(mensagem) {
      const toast = document.getElementById("toast");
      toast.innerText = mensagem;
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }
